name: shuriken-external-tests

# Self-contained conformance harness: Postgres + the shuriken server + one
# container per external test suite. The suite containers live behind the
# `tools` profile so `docker compose up` only starts the server stack; the
# suites are invoked on demand via `docker compose run --rm <suite>` (see
# ./run.sh).
#
# The server is booted in BASIC AUTH mode with a known seeded admin:
#   email    test@example.com
#   password testpassword123
#   slug     test
# which yields a calendar at  /dav/principals/test/cal/primary/
# and an address book at      /dav/principals/test/card/primary/

services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: shuriken
      POSTGRES_PASSWORD: shuriken
      POSTGRES_DB: shuriken
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shuriken -d shuriken"]
      interval: 2s
      timeout: 3s
      retries: 30
    # No host port mapping needed; only the server talks to it.

  server:
    build:
      # Build context is the repo root so docker/Dockerfile can COPY the app.
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://shuriken:shuriken@database:5432/shuriken
      # --- Basic auth, seeded admin (see header) ---
      BASIC_AUTH_ENABLED: "true"
      ADMIN_EMAIL: test@example.com
      ADMIN_PASSWORD: testpassword123
      ADMIN_SLUG: test
      # Keep mail/scheduling listeners off for conformance runs.
      MAIL_ENABLED: "false"
      LMTP_ENABLED: "false"
      LOG_LEVEL: Info
    depends_on:
      - database
    healthcheck:
      # `fetch` resolves even on a 401, so this just proves the HTTP server is
      # accepting connections and routing. bun is already in the image.
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/dav/').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 5s
      retries: 60
    ports:
      # Host-side debugging port (curl/clients). 3737 avoids clashing with a
      # dev server on 3000. The suites reach the server over the compose network
      # as http://server:3000, independent of this mapping.
      - "3737:3000"

  # --- Test suites (started on demand via `docker compose run --rm <suite>`) ---

  caldav-server-tester:
    build: ./caldav-server-tester
    depends_on:
      - server
    environment:
      DAV_URL: http://server:3000/dav/
      CALDAV_USERNAME: test@example.com
      CALDAV_PASSWORD: testpassword123
    volumes:
      - ./caldav-server-tester:/suite
      - ./results:/results
      - ./lib:/harness-lib

  litmus:
    build: ./litmus
    depends_on:
      - server
    environment:
      # litmus creates a child collection named "litmus" under this URL and
      # runs its tests inside it. The `col` namespace is shuriken's generic
      # (non-calendar) collection space, so a plain MKCOL there succeeds — the
      # closest thing to the general WebDAV collection litmus expects. Many
      # litmus tests still fail: shuriken's paths are only one collection level
      # deep, so nested-collection tests (much of copymove/props) cannot route,
      # and locking is unimplemented. Those failures are captured in the
      # baseline. Override LITMUS_URL to retarget.
      LITMUS_URL: http://server:3000/dav/principals/test/col/
      LITMUS_USER: test@example.com
      LITMUS_PASSWORD: testpassword123
    volumes:
      - ./litmus:/suite
      - ./results:/results
      - ./lib:/harness-lib

  python-caldav:
    build: ./python-caldav
    depends_on:
      - server
    environment:
      DAV_URL: http://server:3000/dav/
      CALDAV_USERNAME: test@example.com
      CALDAV_PASSWORD: testpassword123
      PRINCIPAL_URL: http://server:3000/dav/principals/test/
    volumes:
      - ./python-caldav:/suite
      - ./results:/results
      - ./lib:/harness-lib

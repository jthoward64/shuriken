# python-caldav test config: only the shuriken server, as an `external` target.
# Values are filled from the container environment (see docker-compose.yml).
# The embedded radicale/xandikos comparison servers are uninstalled in the
# python-caldav image, so only shuriken is collected/run.
test-servers:
  shuriken:
    type: external
    enabled: true
    url: ${DAV_URL}
    username: ${CALDAV_USERNAME}
    password: ${CALDAV_PASSWORD}

    # Compatibility hints — what shuriken does NOT support at full level, so the
    # suite skips/handles those cleanly rather than failing spuriously. Anything
    # unlisted defaults to `support: full`, so this only records deviations.
    #
    # Auto-generated by the companion tool; regenerate after server changes:
    #   docker compose run --rm --no-deps --entrypoint caldav-server-tester \
    #     caldav-server-tester --caldav-url http://server:3000/dav/ \
    #     --caldav-username <u> --caldav-password <p> --format yaml
    features:
      # Principal search works (search by display name), but listing ALL
      # principals with an empty/match-all filter is intentionally not offered.
      principal-search.list-all:
        support: unsupported
      # Storing a second object whose UID already exists in ANOTHER calendar of
      # the same principal errors (PutError) instead of being handled gracefully
      # — RFC 6638 §3.2.4.1 cross-calendar UID uniqueness. See
      # documentation/planning/finding-calendar-query-filters.md follow-ups.
      save:
        support: ungraceful
      # We advertise calendar-auto-schedule, but the single-user test config
      # can't exercise RFC 6638 scheduling end-to-end (no second attendee), so
      # these stay untested rather than asserted. Provide `scheduling_users` to
      # enable them.
      scheduling.auto-schedule:
        support: unknown
      scheduling.freebusy-query:
        support: unknown
      scheduling.mailbox.inbox-delivery:
        support: unknown
      scheduling.schedule-tag.stable-partstat:
        support: unknown

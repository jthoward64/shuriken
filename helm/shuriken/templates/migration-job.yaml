{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  # Suffix with the revision so each upgrade gets a fresh Job (Helm hooks
  # otherwise hit "Job already exists" on retry).
  name: {{ printf "%s-migrate-%d" (include "shuriken.fullname" .) .Release.Revision | trunc 63 | trimSuffix "-" }}
  labels: {{- include "shuriken.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  template:
    metadata:
      labels: {{- include "shuriken.selectorLabels" . | nindent 8 }}
      {{- with .Values.migrations.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "shuriken.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "shuriken.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["deno", "task", "migrations:run"]
          envFrom:
            - configMapRef:
                name: {{ include "shuriken.fullname" . }}-config
            - secretRef:
                name: {{ include "shuriken.secretName" . }}
          {{- with .Values.extraEnv }}
          env: {{- toYaml . | nindent 12 }}
          {{- end }}
          resources: {{- toYaml .Values.migrations.resources | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts: {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shuriken.serviceAccountName" . }}
  labels: {{- include "shuriken.labels" . | nindent 4 }}
  {{- if or .Values.migrations.enabled .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.migrations.enabled }}
    # Created before the migration hook (weight -5) so its serviceAccountName
    # resolves on a fresh install. See _helpers.tpl migration-prereq note.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}

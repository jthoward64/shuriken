{{- if not .Values.existingSecret.name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shuriken.secretName" . }}
  labels: {{- include "shuriken.labels" . | nindent 4 }}
  {{- if .Values.migrations.enabled }}
  annotations:
    # The migration Job (pre-install/pre-upgrade hook, weight -5) loads this
    # Secret via envFrom, so it must exist before the hook runs. Annotate it as
    # the same hook type with a lower weight (-10) so it's created first.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
  {{- end }}
type: Opaque
stringData:
  {{- with .Values.config.database.url }}
  DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.adminPassword }}
  ADMIN_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.mail.defaultPassword }}
  SMTP_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.mail.credsKey }}
  EMAIL_CREDS_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.mail.profilesJson }}
  SMTP_PROFILES_JSON: {{ . | quote }}
  {{- end }}
{{- end }}

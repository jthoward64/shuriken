apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shuriken.fullname" . }}-config
  labels: {{- include "shuriken.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # ---- server ------------------------------------------------------------
  PORT: {{ .Values.config.server.port | quote }}
  HOST: {{ .Values.config.server.host | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}

  # ---- metrics -----------------------------------------------------------
  METRICS_ENABLED: {{ .Values.config.metrics.enabled | quote }}
  METRICS_PORT: {{ .Values.config.metrics.port | quote }}
  {{- with .Values.config.logLevel }}
  LOG_LEVEL: {{ . | quote }}
  {{- end }}

  # ---- RRULE expansion bounds ---------------------------------------------
  RRULE_MAX_OCCURRENCES: {{ .Values.config.recurrence.rruleMaxOccurrences | quote }}
  RRULE_TIME_BUDGET_MS: {{ .Values.config.recurrence.rruleTimeBudgetMs | quote }}

  # ---- auth --------------------------------------------------------------
  {{- with .Values.config.auth.autoLogin }}
  AUTO_LOGIN: {{ . | quote }}
  {{- end }}
  BASIC_AUTH_ENABLED: {{ .Values.config.auth.basicAuthEnabled | quote }}
  AUTH_RATE_LIMIT_MAX_ATTEMPTS: {{ .Values.config.auth.authRateLimitMaxAttempts | quote }}
  AUTH_RATE_LIMIT_WINDOW_S: {{ .Values.config.auth.authRateLimitWindowS | quote }}
  TRUSTED_PROXIES: {{ .Values.config.auth.trustedProxies | quote }}
  {{- with .Values.config.auth.adminEmail }}
  ADMIN_EMAIL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.adminSlug }}
  ADMIN_SLUG: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.authSettingsUrl }}
  AUTH_SETTINGS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.authSettingsLabel }}
  AUTH_SETTINGS_LABEL: {{ . | quote }}
  {{- end }}
  # ---- OIDC (web UI) -----------------------------------------------------
  OIDC_ENABLED: {{ .Values.config.auth.oidcEnabled | quote }}
  {{- with .Values.config.auth.oidcIssuer }}
  OIDC_ISSUER: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.oidcClientId }}
  OIDC_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.oidcRedirectUri }}
  OIDC_REDIRECT_URI: {{ . | quote }}
  {{- end }}
  OIDC_SCOPES: {{ .Values.config.auth.oidcScopes | quote }}
  OIDC_AUTO_PROVISION: {{ .Values.config.auth.oidcAutoProvision | quote }}
  OIDC_REQUIRE_EMAIL_VERIFIED: {{ .Values.config.auth.oidcRequireEmailVerified | quote }}
  SESSION_TTL_DAYS: {{ .Values.config.auth.sessionTtlDays | quote }}
  {{- with .Values.config.auth.oidcGroupsClaim }}
  OIDC_GROUPS_CLAIM: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.auth.oidcRoleMap }}
  OIDC_ROLE_MAP: {{ . | quote }}
  {{- end }}

  # ---- sharing -------------------------------------------------------------
  SHARING_USER_SEARCH_MODE: {{ .Values.config.sharing.userSearchMode | quote }}

  # ---- external calendar scheduler --------------------------------------
  EXTERNAL_CALENDAR_SCHEDULER_TICK_S: {{ .Values.config.externalCalendar.schedulerTickS | quote }}
  EXTERNAL_CALENDAR_FETCH_CONCURRENCY: {{ .Values.config.externalCalendar.fetchConcurrency | quote }}
  EXTERNAL_CALENDAR_CLAIM_CAP: {{ .Values.config.externalCalendar.claimCap | quote }}
  EXTERNAL_CALENDAR_MAX_RESPONSE_MIB: {{ .Values.config.externalCalendar.maxResponseMib | quote }}
  EXTERNAL_CALENDAR_MAX_REDIRECTS: {{ .Values.config.externalCalendar.maxRedirects | quote }}

  # ---- birthday scheduler ----------------------------------------------
  BIRTHDAY_SCHEDULER_TICK_S: {{ .Values.config.birthday.schedulerTickS | quote }}
  BIRTHDAY_CONCURRENCY: {{ .Values.config.birthday.concurrency | quote }}

  # ---- trash / soft-delete retention -------------------------------------
  TRASH_RETENTION_DAYS: {{ .Values.config.trash.retentionDays | quote }}

  # ---- embedding ----------------------------------------------------------
  EMBED_PANES_ENABLED: {{ .Values.config.embed.panesEnabled | quote }}
  EMBED_CALENDAR_WIDGET_ENABLED: {{ .Values.config.embed.calendarWidgetEnabled | quote }}

  # ---- security headers ---------------------------------------------------
  SECURITY_HEADERS_ENABLED: {{ .Values.config.securityHeaders.enabled | quote }}
  CSP_ENABLED: {{ .Values.config.securityHeaders.cspEnabled | quote }}
  {{- with .Values.config.securityHeaders.frameAncestors }}
  CSP_FRAME_ANCESTORS: {{ . | quote }}
  {{- end }}
  X_CONTENT_TYPE_OPTIONS_ENABLED: {{ .Values.config.securityHeaders.xContentTypeOptionsEnabled | quote }}
  REFERRER_POLICY_ENABLED: {{ .Values.config.securityHeaders.referrerPolicyEnabled | quote }}
  HSTS_ENABLED: {{ .Values.config.securityHeaders.hstsEnabled | quote }}
  PERMISSIONS_POLICY_ENABLED: {{ .Values.config.securityHeaders.permissionsPolicyEnabled | quote }}

  # ---- mail (non-sensitive parts) --------------------------------------
  MAIL_ENABLED: {{ .Values.config.mail.enabled | quote }}
  {{- with .Values.config.mail.defaultFromAddress }}
  SMTP_FROM_ADDRESS: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.mail.defaultFromName }}
  SMTP_FROM_NAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.mail.defaultHost }}
  SMTP_HOST: {{ . | quote }}
  {{- end }}
  SMTP_PORT: {{ .Values.config.mail.defaultPort | quote }}
  {{- with .Values.config.mail.defaultUsername }}
  SMTP_USERNAME: {{ . | quote }}
  {{- end }}
  SMTP_SECURITY: {{ .Values.config.mail.defaultSecurity | quote }}
  LMTP_ENABLED: {{ .Values.config.mail.lmtpEnabled | quote }}
  LMTP_PORT: {{ .Values.config.mail.lmtpPort | quote }}
  LMTP_HOST: {{ .Values.config.mail.lmtpHost | quote }}
  LMTP_MAX_DATA_MIB: {{ .Values.config.mail.lmtpMaxDataMib | quote }}
  LMTP_MAX_RECIPIENTS: {{ .Values.config.mail.lmtpMaxRecipients | quote }}
